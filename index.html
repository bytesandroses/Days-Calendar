<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="A calendar project that allows users to select a month and year to generate a calendar grid."
    />
    <title>Days Calendar Project</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1>Days Calendar Project</h1>
    </header>
    <main>
      <section id="calendarSelector">
        <label for="monthSelector">Select a Month:</label>
        <select id="monthSelector">
          <option value="1">January</option>
          <option value="2">February</option>
          <option value="3">March</option>
          <option value="4">April</option>
          <option value="5">May</option>
          <option value="6">June</option>
          <option value="7">July</option>
          <option value="8">August</option>
          <option value="9">September</option>
          <option value="10">October</option>
          <option value="11">November</option>
          <option value="12">December</option>
        </select>
        <label for="yearInput">Enter Year:</label>
        <input type="number" id="yearInput" step="1" placeholder="Enter year" />
        <button id="generateCalendar">Generate Calendar</button>
      </section>

      <section id="calendarGrid">
        <table id="calendarTable">
          <thead>
            <tr id="calendarHeader">
              <th>Sunday</th>
              <th>Monday</th>
              <th>Tuesday</th>
              <th>Wednesday</th>
              <th>Thursday</th>
              <th>Friday</th>
              <th>Saturday</th>
            </tr>
          </thead>
          <tbody id="calendarDays"></tbody>
        </table>
      </section>

      <section id="switchMonth">
        <button id="prevMonthBtn">Previous Month</button>
        <button id="nextMonthBtn">Next Month</button>
      </section>
    </main>

    <footer>
      <p>
        Built by
        <a href="https://github.com/Elisabeth-Matulian">Elisabeth</a> and
        <a href="https://github.com/bytesandroses">Isaac</a>
      </p>
    </footer>
  </body>
</html>
